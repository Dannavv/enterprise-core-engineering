version: '3.8'

services:
  web:
    build: .
    container_name: erp_lab02_web
    ports:
      - "8082:80" # Using 8082 to avoid conflict with Lab 01 (8081)
    volumes:
      - ./:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: erp_lab02_db
    environment:
      MYSQL_ROOT_PASSWORD: root_password_999
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql # Auto-execute security setup
