version: '3.8'

services:
  web:
    build: .
    container_name: erp_lab14_web
    ports:
      - "8094:80" # Using 8094
    volumes:
      - ./:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: erp_lab14_db
    environment:
      MYSQL_ROOT_PASSWORD: root_password_999
      MYSQL_DATABASE: security_db
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
