version: '3.8'

services:
  web:
    build: .
    container_name: erp_lab13_web
    ports:
      - "8093:80" # Using 8093
    volumes:
      - ./:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: erp_lab13_db
    environment:
      MYSQL_ROOT_PASSWORD: root_password_777
      MYSQL_DATABASE: bank_system
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
