version: '3.8'

services:
  web:
    build: .
    container_name: erp_lab04_web
    ports:
      - "8084:80" # Using 8084 to avoid conflict
    volumes:
      - ./:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: erp_lab04_db
    environment:
      MYSQL_ROOT_PASSWORD: root_password_101
      MYSQL_DATABASE: gateway_db
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
