version: '3.8'

services:
  web:
    build: .
    container_name: erp_lab16_web
    ports:
      - "8096:80" # Using 8096
    volumes:
      - ./:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: erp_lab16_db
    environment:
      MYSQL_ROOT_PASSWORD: root_password_opt
      MYSQL_DATABASE: performance_db
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
